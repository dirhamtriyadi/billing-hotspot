basePath: /api/v1
definitions:
  dto.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.CheckoutRequest:
    properties:
      channel:
        description: Channel is optional and provider-specific (e.g. Tripay "QRIS","BRIVA").
        maxLength: 20
        type: string
      customer_email:
        maxLength: 160
        type: string
      customer_name:
        maxLength: 120
        type: string
      customer_phone:
        maxLength: 30
        type: string
      package_id:
        type: integer
      payment_method:
        enum:
        - cash
        - xendit
        - midtrans
        - tripay
        type: string
    required:
    - customer_name
    - customer_phone
    - package_id
    - payment_method
    type: object
  dto.CreateBatchRequest:
    properties:
      code_length:
        maximum: 20
        minimum: 4
        type: integer
      name:
        maxLength: 120
        type: string
      package_id:
        type: integer
      prefix:
        maxLength: 12
        type: string
      quantity:
        maximum: 2000
        minimum: 1
        type: integer
    required:
    - package_id
    - quantity
    type: object
  dto.DashboardStats:
    properties:
      active_packages:
        type: integer
      paid_orders:
        type: integer
      pending_orders:
        type: integer
      recent_orders:
        items:
          $ref: '#/definitions/models.Order'
        type: array
      revenue_month:
        type: integer
      revenue_today:
        type: integer
      revenue_total:
        type: integer
      total_orders:
        type: integer
      total_packages:
        type: integer
      total_vouchers:
        type: integer
      vouchers_by_status:
        additionalProperties:
          format: int64
          type: integer
        type: object
    type: object
  dto.GatewayMidtrans:
    properties:
      client_key:
        description: public key, shown in full
        type: string
      configured:
        description: has the credentials it needs
        type: boolean
      enabled:
        description: offered to customers
        type: boolean
      production:
        description: live vs sandbox
        type: boolean
      server_key:
        description: masked preview
        type: string
    type: object
  dto.GatewayMidtransInput:
    properties:
      client_key:
        type: string
      enabled:
        type: boolean
      production:
        type: boolean
      server_key:
        type: string
    type: object
  dto.GatewaySettings:
    properties:
      default_provider:
        type: string
      enable_cash:
        type: boolean
      midtrans:
        $ref: '#/definitions/dto.GatewayMidtrans'
      tripay:
        $ref: '#/definitions/dto.GatewayTripay'
      xendit:
        $ref: '#/definitions/dto.GatewayXendit'
    type: object
  dto.GatewayTripay:
    properties:
      api_key:
        description: masked preview
        type: string
      configured:
        type: boolean
      enabled:
        type: boolean
      merchant_code:
        description: shown in full
        type: string
      private_key:
        description: masked preview
        type: string
      production:
        type: boolean
    type: object
  dto.GatewayTripayInput:
    properties:
      api_key:
        type: string
      enabled:
        type: boolean
      merchant_code:
        type: string
      private_key:
        type: string
      production:
        type: boolean
    type: object
  dto.GatewayUpdate:
    properties:
      default_provider:
        type: string
      enable_cash:
        type: boolean
      midtrans:
        $ref: '#/definitions/dto.GatewayMidtransInput'
      tripay:
        $ref: '#/definitions/dto.GatewayTripayInput'
      xendit:
        $ref: '#/definitions/dto.GatewayXenditInput'
    type: object
  dto.GatewayXendit:
    properties:
      callback_token:
        description: masked preview
        type: string
      configured:
        type: boolean
      enabled:
        type: boolean
      secret_key:
        description: masked preview
        type: string
    type: object
  dto.GatewayXenditInput:
    properties:
      callback_token:
        type: string
      enabled:
        type: boolean
      secret_key:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      password:
        example: admin123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      expires_at:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.NASInput:
    properties:
      description:
        maxLength: 200
        type: string
      nasname:
        maxLength: 128
        type: string
      ports:
        maximum: 65535
        minimum: 1
        type: integer
      secret:
        maxLength: 60
        type: string
      shortname:
        maxLength: 32
        type: string
      type:
        maxLength: 30
        type: string
    required:
    - nasname
    - secret
    type: object
  dto.PackageRequest:
    properties:
      badge_text:
        maxLength: 40
        type: string
      burst_enabled:
        type: boolean
      color:
        maxLength: 20
        type: string
      data_quota_mb:
        minimum: 0
        type: integer
      description:
        maxLength: 1000
        type: string
      highlight:
        type: boolean
      icon:
        maxLength: 40
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 120
        type: string
      price:
        minimum: 0
        type: integer
      rate_down_kbps:
        minimum: 64
        type: integer
      rate_up_kbps:
        minimum: 64
        type: integer
      session_timeout_secs:
        minimum: 0
        type: integer
      simultaneous_use:
        maximum: 100
        minimum: 1
        type: integer
      sort_order:
        type: integer
      validity_unit:
        enum:
        - minute
        - hour
        - day
        - month
        type: string
      validity_value:
        minimum: 1
        type: integer
    required:
    - name
    - rate_down_kbps
    - rate_up_kbps
    - simultaneous_use
    - validity_unit
    - validity_value
    type: object
  dto.PublicPackage:
    properties:
      badge_text:
        type: string
      color:
        type: string
      data_quota_mb:
        type: integer
      description:
        type: string
      download_mbps:
        type: number
      highlight:
        type: boolean
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      price:
        type: integer
      slug:
        type: string
      upload_mbps:
        type: number
      validity:
        type: string
      validity_unit:
        type: string
      validity_value:
        type: integer
    type: object
  dto.Report:
    properties:
      by_method:
        items:
          $ref: '#/definitions/dto.RevenueByMethod'
        type: array
      by_package:
        items:
          $ref: '#/definitions/dto.RevenueByPackage'
        type: array
      series:
        items:
          $ref: '#/definitions/dto.RevenuePoint'
        type: array
      summary:
        $ref: '#/definitions/dto.ReportSummary'
    type: object
  dto.ReportSummary:
    properties:
      avg_order_value:
        type: integer
      end:
        type: string
      paid_orders:
        type: integer
      revenue_total:
        type: integer
      start:
        type: string
      total_orders:
        type: integer
      vouchers_issued:
        type: integer
    type: object
  dto.RevenueByMethod:
    properties:
      method:
        type: string
      orders:
        type: integer
      revenue:
        type: integer
    type: object
  dto.RevenueByPackage:
    properties:
      orders:
        type: integer
      package_id:
        type: integer
      package_name:
        type: string
      revenue:
        type: integer
    type: object
  dto.RevenuePoint:
    properties:
      date:
        description: YYYY-MM-DD
        type: string
      orders:
        type: integer
      revenue:
        type: integer
    type: object
  dto.UpdateVoucherStatusRequest:
    properties:
      status:
        enum:
        - active
        - disabled
        type: string
    required:
    - status
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  models.Order:
    properties:
      amount:
        type: integer
      created_at:
        type: string
      customer_email:
        type: string
      customer_name:
        type: string
      customer_phone:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      order_number:
        type: string
      package:
        $ref: '#/definitions/models.Package'
      package_id:
        type: integer
      paid_at:
        type: string
      payment_method:
        description: cash|xendit|midtrans|tripay
        type: string
      payment_token:
        description: e.g. Midtrans Snap token
        type: string
      payment_url:
        description: hosted checkout / redirect URL
        type: string
      qr_string:
        type: string
      reference:
        description: Gateway artefacts (empty for cash).
        type: string
      status:
        type: string
      updated_at:
        type: string
      voucher:
        $ref: '#/definitions/models.Voucher'
      voucher_id:
        type: integer
    type: object
  models.Package:
    properties:
      badge_text:
        type: string
      burst_enabled:
        type: boolean
      color:
        type: string
      created_at:
        type: string
      data_quota_mb:
        description: DataQuotaMB caps total transfer in megabytes (0 = unlimited).
        type: integer
      description:
        type: string
      highlight:
        description: Presentation / merchandising for the package-selection UI.
        type: boolean
      icon:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      price:
        description: IDR, whole rupiah
        type: integer
      profile:
        description: Radius profile name (FreeRADIUS group). Derived from slug.
        type: string
      rate_down_kbps:
        description: Bandwidth (kbps). RateUp = client upload, RateDown = client download.
        type: integer
      rate_up_kbps:
        type: integer
      session_timeout_secs:
        description: SessionTimeoutSecs caps total online time (0 = unlimited).
        type: integer
      simultaneous_use:
        description: SimultaneousUse caps concurrent logins for one voucher.
        type: integer
      slug:
        type: string
      sort_order:
        type: integer
      updated_at:
        type: string
      validity_unit:
        type: string
      validity_value:
        description: Validity window, e.g. 1 day. Combined into ValidityUnit/Value.
        type: integer
    type: object
  models.Voucher:
    properties:
      activated_at:
        description: first login (best-effort)
        type: string
      batch_id:
        type: integer
      code:
        type: string
      created_at:
        type: string
      expires_at:
        description: validity deadline
        type: string
      id:
        type: integer
      note:
        type: string
      order_id:
        type: integer
      package:
        $ref: '#/definitions/models.Package'
      package_id:
        type: integer
      price:
        description: snapshot of package price
        type: integer
      profile:
        description: snapshot of package profile
        type: string
      status:
        type: string
      synced_to_radius:
        type: boolean
      updated_at:
        type: string
      used_at:
        type: string
    type: object
  models.VoucherBatch:
    properties:
      code_length:
        type: integer
      created_at:
        type: string
      created_by:
        type: integer
      id:
        type: integer
      name:
        type: string
      package:
        $ref: '#/definitions/models.Package'
      package_id:
        type: integer
      prefix:
        type: string
      quantity:
        type: integer
      updated_at:
        type: string
      vouchers:
        description: |-
          Voucher.BatchID is non-conventional (GORM would expect VoucherBatchID),
          so the foreign key is declared explicitly.
        items:
          $ref: '#/definitions/models.Voucher'
        type: array
    type: object
  radius.NAS:
    properties:
      community:
        type: string
      description:
        type: string
      id:
        type: integer
      nasname:
        type: string
      ports:
        type: integer
      secret:
        type: string
      server:
        type: string
      shortname:
        type: string
      type:
        type: string
    type: object
  response.Envelope:
    properties:
      data: {}
      error:
        $ref: '#/definitions/response.ErrorBody'
      message:
        type: string
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
  response.ErrorBody:
    properties:
      code:
        type: string
      details:
        items:
          $ref: '#/definitions/response.FieldError'
        type: array
    type: object
  response.FieldError:
    properties:
      field:
        type: string
      message:
        type: string
      tag:
        type: string
    type: object
  response.Meta:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
info:
  contact: {}
  description: Backend billing, package & voucher API for a FreeRADIUS/Mikrotik hotspot.
    Provisions credentials via the radius-api and accepts payments via Xendit, Midtrans
    and Tripay.
  title: Billing Hotspot API
  version: "1.0"
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Passwords
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Change current user's password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Admin login
      tags:
      - Auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Current authenticated user
      tags:
      - Auth
  /batches:
    get:
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Per page
        in: query
        name: per_page
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.VoucherBatch'
                  type: array
                meta:
                  $ref: '#/definitions/response.Meta'
              type: object
      security:
      - BearerAuth: []
      summary: List voucher batches
      tags:
      - Batches
    post:
      consumes:
      - application/json
      parameters:
      - description: Batch
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBatchRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/models.VoucherBatch'
              type: object
      security:
      - BearerAuth: []
      summary: Generate a batch of vouchers
      tags:
      - Batches
  /batches/{id}:
    delete:
      parameters:
      - description: Batch ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Delete a batch and its vouchers
      tags:
      - Batches
    get:
      parameters:
      - description: Batch ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/models.VoucherBatch'
              type: object
      security:
      - BearerAuth: []
      summary: Get a batch with its vouchers
      tags:
      - Batches
  /dashboard/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.DashboardStats'
              type: object
      security:
      - BearerAuth: []
      summary: Dashboard statistics
      tags:
      - Dashboard
  /nas:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/radius.NAS'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: List NAS / RADIUS clients
      tags:
      - NAS
    post:
      consumes:
      - application/json
      parameters:
      - description: NAS
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.NASInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/radius.NAS'
              type: object
      security:
      - BearerAuth: []
      summary: Register or update a NAS / RADIUS client
      tags:
      - NAS
  /nas/{id}:
    delete:
      parameters:
      - description: NAS ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Remove a NAS / RADIUS client
      tags:
      - NAS
  /orders:
    get:
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Per page
        in: query
        name: per_page
        type: integer
      - description: Search by number/customer
        in: query
        name: search
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by payment method
        in: query
        name: payment_method
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Order'
                  type: array
                meta:
                  $ref: '#/definitions/response.Meta'
              type: object
      security:
      - BearerAuth: []
      summary: List orders
      tags:
      - Orders
  /orders/{id}:
    get:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/models.Order'
              type: object
      security:
      - BearerAuth: []
      summary: Get an order
      tags:
      - Orders
  /orders/{id}/confirm-cash:
    post:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/models.Order'
              type: object
      security:
      - BearerAuth: []
      summary: Confirm cash payment for an order (issues the voucher)
      tags:
      - Orders
  /orders/{id}/mark-paid:
    post:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/models.Order'
              type: object
      security:
      - BearerAuth: []
      summary: Manually settle a gateway order (webhook failed / payment page closed)
      tags:
      - Orders
  /packages:
    get:
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Per page
        in: query
        name: per_page
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Package'
                  type: array
                meta:
                  $ref: '#/definitions/response.Meta'
              type: object
      security:
      - BearerAuth: []
      summary: List packages
      tags:
      - Packages
    post:
      consumes:
      - application/json
      parameters:
      - description: Package
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.PackageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/models.Package'
              type: object
      security:
      - BearerAuth: []
      summary: Create a package
      tags:
      - Packages
  /packages/{id}:
    delete:
      parameters:
      - description: Package ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Delete a package
      tags:
      - Packages
    get:
      parameters:
      - description: Package ID
        in: path
        name: id
        required: true
        type: integer
