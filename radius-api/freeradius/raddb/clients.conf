# -*- text -*-
#
# RADIUS clients (NAS devices) — who may send RADIUS requests, and with which
# shared secret.
#
# PRIMARY SOURCE = the SQL `nas` table. With `read_clients = yes` in
# mods-available/sql, FreeRADIUS loads every router registered through the admin
# panel (radius-api POST /api/v1/nas), each with ITS OWN unique secret. When a
# NAS is added/changed/removed, radius-api restarts this container so the new
# client list takes effect immediately (see radiusreload).
#
# This file only defines:
#   1. localhost — so radtest/radclient work for diagnostics.
#   2. An OPTIONAL subnet-wide fallback (disabled by default) for operators who
#      prefer a single shared secret for every router instead of per-NAS secrets.

# Local containers / loopback (testing with radtest, radclient).
client localhost {
    ipaddr    = 127.0.0.1
    secret    = ${NAS_SHARED_SECRET}
    shortname = localhost
    nas_type  = other
}

client localhost_ipv6 {
    ipv6addr  = ::1
    secret    = ${NAS_SHARED_SECRET}
}

# Subnet-wide fallback so a router authenticates even when (a) it isn't yet
# registered in the panel, or (b) Docker rewrites its source IP to the bridge
# gateway (a common cause of "RADIUS not responding" — FreeRADIUS silently drops
# requests from unknown client IPs). Routers registered in the `nas` table with
# their OWN /32 secret still take precedence (FreeRADIUS matches most-specific).
# To enforce per-router secrets only, comment this block out.
client mikrotik_subnet {
    ipaddr      = ${NAS_CLIENT_SUBNET}
    secret      = ${NAS_SHARED_SECRET}
    shortname   = mikrotik
    nas_type    = mikrotik
    require_message_authenticator = no
}
