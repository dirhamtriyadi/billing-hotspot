# =============================================================================
#  Frontend SPA (React build served by nginx).
#  Fully standalone: the browser calls the backend directly at
#  VITE_API_BASE_URL, so this stack needs no shared network — just the backend
#  reachable from the user's browser.
#
#  Usage:  cp .env.example .env   &&   docker compose up -d --build
#  Served on http://localhost:8088
# =============================================================================

services:
  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: billing-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8088}:80"
